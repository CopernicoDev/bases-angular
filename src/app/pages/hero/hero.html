<h1>{{ name() }}</h1>

<dl>
    <td>Nombre:</td>
    <dd>{{ name() }}</dd>

    <td>Edad:</td>
    <dd>{{ age() }}</dd>

    <td>Método:</td>
    <dd>{{ heroDescription() }}</dd>

    <td>Capitalizado:</td>
    <dd>{{ capitalizedName() | uppercase }}</dd>
</dl>

<button (click)="changeHero()" class="btn btn-primary mx-2">
    Cambiar nombre
</button>

<button (click)="changeAge(10)" class="btn btn-primary mx-2">Cambiar edad</button>

<button (click)="resetHero()" class="btn btn-primary mx-2">Reset</button>
